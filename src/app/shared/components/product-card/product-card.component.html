<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
  @for (item of products; track $index) {
  <div
    class="bg-card text-black border border-gray-400 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
    <div class="aspect-4/3 p-1 overflow-hidden bg-transparent">
      <img [src]="item.image_url" [alt]="item.name" class="w-full rounded-[10px] h-full object-contain" />
    </div>

    <div class="p-4">
      <div class="flex items-start justify-between mb-2">
        <h4 class="font-semibold text-card-foreground text-sm">{{ item.name }}</h4>
        <span class="font-bold text-destructive text-sm whitespace-nowrap">
          {{ item.price | khmerNumber }} ដុលា្លរ
        </span>
      </div>
      <div class="flex items-start justify-between mb-2">
        <h4 class="font-semibold text-card-foreground text-sm">បន្ទាប់ពីបញ្ចុះតម្លៃរួច</h4>
        <span class="font-bold text-destructive text-sm whitespace-nowrap">
          {{ item.price_after_discount | khmerNumber }} ដុលា្លរ
        </span>
      </div>

      <!-- <p class="text-xs text-muted-foreground mb-4">
          ចំនួនក្នុងស្តុក: {{ item.qty | khmerNumber }}
        </p> -->

      <div class="flex gap-2">
        <!-- Delete -->
        <button (click)="openDelete(item._id, item.name)" type="button"
          class="flex-1 cursor-pointer bg-destructive rounded-xl hover:bg-destructive/90 text-destructive-foreground text-xs h-8">
          លុប
        </button>

        <!-- Edit -->
        <button type="button" (click)="open(item._id!)"
          class="flex-1 cursor-pointer bg-stat-pink rounded-xl hover:bg-stat-pink/90 text-white text-xs h-8">
          កែសម្រួល
        </button>

        <!-- Detail -->
        <a [routerLink]="['/merchant/product/productdetail', item._id]"
          class="flex-1 bg-green-700 flex justify-center items-center rounded-xl text-white cursor-pointer text-xs h-8">
          លម្អិត
        </a>
      </div>
    </div>
  </div>
  }
</div>
<!-- Delete Dialog -->
<app-delete-dialog [open]="showDeleteDialog" [name]="selectedName" (cancel)="handleCancel()"
  (confirm)="handleDelete()"></app-delete-dialog>

<!-- ✅ Edit Dialog -->
<app-box-dialog title="កែសម្រួលផលិតផល" (close)="close()">
  <!-- Profile -->
  <form [formGroup]="form">
    <div class="flex gap-6">
      <label for="file" class="relative w-32 h-32 rounded-xl overflow-hidden bg-gray-200">
        <!-- <img src="https://i.pravatar.cc/300" class="w-full h-full object-cover" /> -->
        <img src="{{ image_url }}" class="w-full h-full object-contain" />
        <div
          class="bg-black/50 top-0 text-center text-[12px] text-white cursor-pointer font-bold flex justify-center items-center left-0 opacity-0 hover:opacity-100 duration-300 absolute h-full w-full">
          Update Image
        </div>
        <input (change)="onFileChange($event)" type="file" id="file"
          class="absolute opacity-0 inset-0 bg-black/40 items-center justify-center text-white text-xs cursor-pointer" />
      </label>

      <!-- Form -->
      <div class="grid grid-cols-1 text-card-foreground gap-4 flex-1">
        <div class="grid grid-cols-2 gap-4">
          <div class="flex flex-col gap-3">
            <label class="label-text text-card-foreground">ឈ្មោះផលិតផល <span class="text-destructive">*</span></label>
            <input formControlName="name" placeholder="ឈ្មោះទំនិញ"
              class="input bg-gray-300 outline-gray-400 placeholder:text-muted-foreground text-foreground input-bordered w-full" />
          </div>

          <div class="flex flex-col gap-3">
            <label class="label-text text-card-foreground">តម្លៃ <span class="text-destructive">*</span></label>
            <input formControlName="price" placeholder="$"
              class="input bg-gray-300 outline-gray-400 placeholder:text-muted-foreground text-foreground input-bordered w-full" />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="flex flex-col gap-3">
            <label class="label-text text-card-foreground">ប្រភេទ <span class="text-destructive">*</span></label>
            <select name="" class="select w-full bg-gray-300 outline-gray-400 text-foreground" id=""
              formControlName="category">
              @for (item of categories(); track $index) {
              <option [value]="item._id">{{ item.name }}</option>
              }
              <!-- <option value="accessories">គ្រឿងអលង្ការ</option>
          <option value="souvenirs">វត្ថុអនុស្សាវរីយ៍</option> -->
            </select>
          </div>

          <!-- <div class="flex flex-col gap-3">
          <label class="label-text text-card-foreground"
            >ចំនួនស្តុក <span class="text-destructive">*</span></label
          >
          <input
            type="number"
            name=""
            formControlName="qty"
            placeholder="0"
            class="input bg-gray-300 outline-gray-400 text-foreground w-full"
            id=""
          />
        </div> -->

          <!-- Gender -->
          <div class="flex flex-col gap-3">
            <label class="label-text text-card-foreground">បញ្ចុះតម្លៃ % <span class="text-destructive">*</span></label>
            <input formControlName="discount" type="number" placeholder="%" name=""
              class="input bg-gray-300 outline-gray-400 w-full text-foreground" id="" />
          </div>
        </div>
        <div class="flex flex-col gap-3">
          <label for="" class="text-card-foreground">ពិពណ៌នា <span class="text-destructive">*</span></label>
          <textarea name="" class="textarea bg-gray-300 outline-gray-400 text-foreground w-full"
            formControlName="description" placeholder="ការពិពណ៌នា..." id="">
          </textarea>
        </div>
      </div>
    </div>
  </form>

  <!-- Footer -->
  <div class="flex justify-end">
    <button class="btn btn-primary rounded-2xl" (click)="update()">Update</button>
  </div>
</app-box-dialog>
