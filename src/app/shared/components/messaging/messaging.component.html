<div class="bg-white p-6 rounded-2xl shadow-sm h-full flex flex-col">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-gray-800">សារពីអតិថិជន</h2>
        <button class="text-sm font-semibold text-primary hover:underline cursor-pointer">មើលទាំងអស់</button>
    </div>

    <div class="space-y-4 overflow-y-auto flex-1">
        <div *ngFor="let message of messages"
            class="flex gap-4 p-3 hover:bg-gray-50 rounded-xl transition-colors cursor-pointer group">
            <div class="relative shrink-0">
                <img [src]="message.avatar" alt="Avatar" class="w-12 h-12 rounded-full object-cover">
                <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></span>
            </div>
            <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between mb-1">
                    <h3 class="font-semibold text-gray-900 truncate">{{ message.user }}</h3>
                    <span class="text-xs text-gray-500 whitespace-nowrap ml-2">{{ message.time }}</span>
                </div>
                <p class="text-sm text-gray-600 truncate group-hover:text-gray-900">{{ message.content }}</p>
            </div>
        </div>
    </div>

    <div class="mt-6 pt-4 border-t">
        <div class="flex gap-2">
            <input type="text" placeholder="ផ្ញើសាររហ័ស..."
                class="flex-1 px-4 py-2 bg-gray-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20">
            <button class="p-2 bg-primary text-white rounded-lg hover:opacity-90 transition-opacity">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13" />
                    <polyline points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
            </button>
        </div>
    </div>
</div>
