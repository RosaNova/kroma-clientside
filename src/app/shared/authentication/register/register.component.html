<main class="min-h-screen flex justify-center items-center bg-white">
  <div class="w-full max-w-md bg-gray-100 py-6 px-6">
    <h2 class="text-xl font-bold mb-4">Register</h2>
    <form [formGroup]="form" class="space-y-3">
      <div>
        <label class="text-sm font-medium">Role</label>
        <select formControlName="role" class="w-full h-10 rounded-md border px-3 mt-2">
          <option value="MERCHANT">Merchant</option>
          <option value="SUPER_ADMIN">Super Admin</option>
        </select>
      </div>

      <div>
        <label class="text-sm font-medium">Name</label>
        <input formControlName="name" class="w-full h-10 rounded-md border px-3 mt-2" />
      </div>

      <div>
        <label class="text-sm font-medium">Email</label>
        <input formControlName="email" type="email" class="w-full h-10 rounded-md border px-3 mt-2" />
      </div>

      <div>
        <label class="text-sm font-medium">Password</label>
        <input formControlName="password" type="password" class="w-full h-10 rounded-md border px-3 mt-2" />
      </div>

      <button type="submit" [disabled]="isLoading" class="w-full h-10 bg-khaki text-white rounded-md">
        <span *ngIf="!isLoading">Register</span>
        <span *ngIf="isLoading">Registering...</span>
      </button>
    </form>
  </div>
</main>
