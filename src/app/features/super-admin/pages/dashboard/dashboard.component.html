<div class="p-6 space-y-6 bg-gray-50/50 min-h-screen">
    <!-- Platform Stats -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <app-stat-card *ngFor="let s of SUPER_ADMIN_DASHBOARD_STATS" [title]="s.title" [value]="s.value"
            [change]="s.change" [changeType]="s.changeType" [icon]="s.icon" [variant]="s.variant">
        </app-stat-card>
    </div>

    <!-- Middle Section: Charts -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-semibold text-card-foreground">
                    ទិដ្ឋភាពទូទៅបង្ហាញអំពីចំណូលប្រចាំខែ
                </h3>
            </div>
            <app-sale-chart [categories]="monthlyRevenueCategories" [seriesData]="monthlyRevenueSeriesData"
                [selectedYearType]="selectedRevenueYearType" (yearTypeChange)="onRevenueYearTypeChange($event)">
            </app-sale-chart>

        </div>
        <div class="bg-white flex flex-col justify-between p-6 rounded-2xl shadow-sm">
            <div class="mb-4">
                <h2 class="text-xl font-bold text-gray-800">ចំណូលតាមប្រភេទហាង</h2>
                <p class="text-sm text-gray-400 mt-1">Revenue by Store Category</p>
            </div>
            <app-category-chart [series]="categoryChartSeries" [labels]="categoryChartLabels">
            </app-category-chart>
        </div>
    </div>

    <!-- Bottom Section: Top Merchants & Messaging -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 pb-6">
        <!-- Top Performing Merchants -->
        <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-gray-800">អាជីវករដែលមានសកម្មភាពខ្លាំង</h2>
                <button class="text-sm font-semibold text-primary hover:underline cursor-pointer">មើលទាំងអស់</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left ">
                    <thead class="border border-gray-500 bg-gray-400">
                        <tr class="text-black  text-xs  h-10 text-center uppercase tracking-wider ">
                            <th class="border border-gray-600 font-medium">ហាង</th>
                            <th class="border border-gray-600 font-medium">ម្ចាស់</th>
                            <th class="border border-gray-600 font-medium">ចំណូល</th>
                            <th class="border border-gray-600 font-medium">ស្ថានភាព</th>
                            <th class="border border-gray-600 font-medium">កំណើន</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <tr *ngFor="let merchant of topMerchants"
                            class="hover:bg-gray-50 border-gray-200 text-center border-b transition-colors">
                            <td class="py-4 border border-gray-600 text-center font-medium text-gray-900">{{
                                merchant.name }}</td>
                            <td class="py-4 border text-gray-600 text-sm">{{ merchant.owner }}</td>
                            <td class="py-4 border border-gray-600 font-semibold text-gray-900">{{ merchant.sales }}
                            </td>
                            <td class="py-4 border border-gray-600">
                                <span class="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider"
                                    [ngClass]="merchant.status === 'active' ? 'bg-green-100 text-green-600' : 'bg-yellow-100 text-yellow-600'">
                                    {{ merchant.status }}
                                </span>
                            </td>
                            <td class="py-4 text-sm border border-gray-600 font-medium"
                                [ngClass]="merchant.performance.startsWith('+') ? 'text-green-500' : 'text-red-500'">
                                {{ merchant.performance }}
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
